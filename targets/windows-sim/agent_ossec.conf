<ossec_config>

  <client>
    <server>
      <address>wazuh.manager</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <config-profile>windows</config-profile>
    <notify_time>10</notify_time>
    <time-reconnect>60</time-reconnect>
    <auto_restart>yes</auto_restart>
    <crypto_method>aes</crypto_method>
  </client>

  <client_buffer>
    <disabled>no</disabled>
    <queue_size>5000</queue_size>
    <events_per_second>500</events_per_second>
  </client_buffer>

  <!-- Read fake Windows Event Log JSON generated by eventlog_generator.py -->
  <localfile>
    <log_format>json</log_format>
    <location>/var/log/win-eventlog.json</location>
  </localfile>

  <!-- File Integrity Monitoring on key paths -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>300</frequency>
    <scan_on_start>yes</scan_on_start>
    <directories realtime="yes" check_all="yes">/etc</directories>
    <directories realtime="yes" check_all="yes">/tmp</directories>
  </syscheck>

  <logging>
    <log_format>plain</log_format>
  </logging>

</ossec_config>
